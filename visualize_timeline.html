<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>April 7, 2026 Timeline Visualization</title>
    <link rel="stylesheet" href="https://leaflet.js.org/dist/leaflet.css" />
    <script src="https://leaflet.js.org/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f5; }
        .container { display: flex; height: 100vh; }
        #map { flex: 2; }
        .sidebar {
            flex: 1;
            background: white;
            overflow-y: auto;
            padding: 20px;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
        }
        h1 { color: #333; margin-bottom: 20px; font-size: 18px; }
        .entry {
            background: #f9f9f9;
            padding: 15px;
            margin-bottom: 12px;
            border-left: 4px solid #007bff;
            border-radius: 4px;
        }
        .entry h3 { font-size: 14px; color: #007bff; margin-bottom: 8px; }
        .entry p { font-size: 12px; color: #666; margin-bottom: 4px; }
        .entry strong { color: #333; }
        .time { font-size: 11px; background: #e8f4ff; padding: 4px 8px; border-radius: 3px; display: inline-block; margin-top: 5px; }
        .stats {
            background: #e8f4ff;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
        }
        .stats p { font-size: 13px; margin-bottom: 5px; color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <div id="map"></div>
        <div class="sidebar">
            <h1>🗺️ April 7, 2026 Timeline</h1>
            <div class="stats" id="stats"></div>
            <div id="timeline"></div>
        </div>
    </div>

    <script>
        // Initialize map centered on Dubai area
        const map = L.map('map').setView([54.538, 24.320], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        // Load and parse timeline data
        fetch('Timelineapril7.json')
            .then(response => response.json())
            .then(data => {
                console.log('Loaded timeline data:', data);
                renderTimeline(data);
                renderMap(data);
            })
            .catch(error => console.error('Error loading JSON:', error));

        function renderMap(data) {
            let totalPoints = 0;
            const colors = ['#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A', '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E2'];
            
            data.forEach((entry, index) => {
                const color = colors[index % colors.length];
                const points = entry.timelinePath;
                
                points.forEach((point, idx) => {
                    totalPoints++;
                    const [lat, lon] = point.point.split('°, ').map(v => parseFloat(v.replace('°', '')));
                    const popup = `<strong>${entry.startTime.slice(11, 16)}</strong><br/>
                                   Point: ${point.point}<br/>
                                   Time: ${point.time.slice(11, 19)}`;
                    
                    L.circleMarker([lat, lon], {
                        radius: 4,
                        fillColor: color,
                        color: '#fff',
                        weight: 2,
                        opacity: 1,
                        fillOpacity: 0.8
                    }).bindPopup(popup).addTo(map);
                });
            });

            // Stats
            const statsDiv = document.getElementById('stats');
            statsDiv.innerHTML = `
                <p><strong>Total Entries:</strong> ${data.length}</p>
                <p><strong>Total Points:</strong> ${totalPoints}</p>
                <p><strong>Date:</strong> April 7, 2026</p>
                <p><strong>Location:</strong> Dubai Area</p>
            `;
        }

        function renderTimeline(data) {
            const timelineDiv = document.getElementById('timeline');
            timelineDiv.innerHTML = '';
            
            data.forEach((entry, index) => {
                const startTime = entry.startTime.slice(11, 19);
                const endTime = entry.endTime.slice(11, 19);
                const pointCount = entry.timelinePath.length;
                
                const entryHtml = `
                    <div class="entry">
                        <h3>Entry ${index + 1} - ${startTime} to ${endTime}</h3>
                        <p><strong>Points:</strong> ${pointCount}</p>
                        <p><strong>Duration:</strong> 2 hours</p>
                        <div class="time">${startTime}</div>
                    </div>
                `;
                timelineDiv.innerHTML += entryHtml;
            });
        }
    </script>
</body>
</html>
